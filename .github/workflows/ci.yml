name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package editable + test deps
        run: |
          python -m pip install -e . || true
          python -m pip install pytest typer pydantic portalocker rich

      - name: Add lightweight uv shim
        run: |
          mkdir -p $GITHUB_WORKSPACE/.bin
          printf '#!/usr/bin/env bash\nexec tp-cli "$@"\n' > $GITHUB_WORKSPACE/.bin/uv
          chmod +x $GITHUB_WORKSPACE/.bin/uv
          echo "$GITHUB_WORKSPACE/.bin" >> $GITHUB_PATH

      - name: Run tests
        run: pytest -q
