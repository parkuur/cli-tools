name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Sync dev env
        run: uv sync --group dev
      - name: Run ruff
        run: uv run ruff check src tests

  type-check:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Sync dev env
        run: uv sync --group dev
      - name: Run mypy
        run: uv run mypy --strict src

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-venv-
      - name: Sync dev env
        run: uv sync --group dev
      - name: Prepare reports directory
        run: mkdir -p reports
      - name: Run unit tests
        run: uv run pytest -m unit tests/unit/ --junitxml=reports/unit.xml --cov=src --cov-report=xml:reports/coverage.xml
      - name: Upload unit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: reports/

  integration:
    name: Integration tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-venv-
      - name: Sync dev env
        run: uv sync --group dev
      - name: Run ruff
        run: uv run ruff check src tests
      - name: Run mypy
        run: uv run mypy --strict src
      - name: Prepare reports directory
        run: uv run python -c "from pathlib import Path; Path('reports').mkdir(parents=True, exist_ok=True)"
      - name: Run unit tests
        run: uv run pytest -m unit tests/unit/ --junitxml=reports/unit-${{ matrix.os }}.xml --cov=src --cov-report=xml:reports/coverage-${{ matrix.os }}.xml
      - name: Prepare reports directory
        run: uv run python -c "from pathlib import Path; Path('reports').mkdir(parents=True, exist_ok=True)"
      - name: Run integration tests
        run: uv run pytest -m integration tests/integration/ --junitxml=reports/integration-${{ matrix.os }}.xml
      - name: Run shell wrapper tests (non-Windows)
        if: runner.os != 'Windows'
        run: bash tests/shell/test_bash_wrapper.sh
      - name: Upload integration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: integration-reports-${{ matrix.os }}
          path: reports/

  shell-tests:
    name: Shell wrapper tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Sync dev env
        run: uv sync --group dev
      - name: Run bash wrapper script
        run: bash tests/shell/test_bash_wrapper.sh
